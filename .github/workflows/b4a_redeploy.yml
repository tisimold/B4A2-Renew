name: B4A Auto Redeploy

on:
  schedule:
    - cron: '0 * * * *'  # 每60分钟
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install seleniumbase requests

      - name: Install gost
        run: |
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          sudo mv gost-linux-amd64-2.11.5 /usr/local/bin/gost

      - name: Start gost proxy
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          gost -L=http://:8080 -F="${PROXY_URL}" &
          sleep 2
          echo "gost started"

      - name: Run redeploy script
        env:
          B4A_EMAIL: ${{ secrets.B4A_EMAIL }}
          B4A_PASSWORD: ${{ secrets.B4A_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python b4a_redeploy.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
